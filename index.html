<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Coffee — Логистика</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#297b89">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ac: #297b89; --ac-dk: #1e6070; --ac-dim: rgba(41,123,137,.10);
            --bg: #f2f5f7; --sur: #ffffff; --sur2: #eef1f4; --bd: rgba(41,123,137,.12);
            --tx: #1a2430; --txs: #5a6a78; --txm: #9aaab8; --r: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; padding-bottom: 80px; font-size: 14px; }
        
        .hdr { background: var(--sur); border-bottom: 1px solid var(--bd); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 10px rgba(41,123,137,.08); }
        .hdr-row { display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .logo-w { width: 34px; height: 34px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--bd); overflow: hidden; }
        .logo-w img { width: 100%; height: 100%; object-fit: contain; }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--ac); }
        
        .wh-sel { appearance: none; background: var(--ac-dim); border: 1px solid var(--bd); border-radius: 20px; padding: 6px 12px; font-size: 11px; font-weight: 700; color: var(--ac); }
        .srch-w { padding: 12px 16px; }
        .srch-in { width: 100%; background: var(--sur); border: 1px solid var(--bd); border-radius: 12px; padding: 10px 15px; font-size: 13px; outline: none; }
        
        .fil-w { padding: 0 16px 12px; }
        .fil-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .fil-btn { background: var(--sur); border: 1px solid var(--bd); border-radius: 8px; padding: 8px; font-size: 10px; font-weight: 600; color: var(--txs); cursor: pointer; text-align: center; }
        .fil-btn.active { background: var(--ac); color: #fff; border-color: var(--ac); }
        
        .card { background: var(--sur); border-radius: 14px; margin: 0 16px 10px; border: 1px solid var(--bd); padding: 15px; cursor: pointer; }
        .c-head { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .c-id { font-weight: 800; color: var(--ac); }
        .s-pill { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 10px; background: var(--ac-dim); color: var(--ac); }
        .c-supp { font-weight: 700; margin-bottom: 4px; }
        .c-meta { font-size: 11px; color: var(--txs); }
        
        .m-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; }
        .m-ov.open { display: flex; }
        .modal { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .m-close { width: 100%; padding: 12px; background: var(--ac); color: #fff; border: none; border-radius: 10px; margin-top: 15px; font-weight: 700; }
        
        .rfsh { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--ac); border-radius: 50%; border: none; color: #fff; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<header class="hdr">
    <div class="hdr-row">
        <div class="brand">
            <div class="logo-w"><img src="logo.png" alt="L"></div>
            <div class="brand-name">Master Coffee</div>
        </div>
        <select class="wh-sel" id="whSel">
            <option value="">Все склады</option>
            <option value="УК">УК</option>
            <option value="Астана">Астана</option>
            <option value="Алматы">Алматы</option>
        </select>
    </div>
</header>

<div class="srch-w"><input type="text" class="srch-in" id="srchIn" placeholder="Поиск поставщика..."></div>

<div class="fil-w">
    <div class="fil-grid" id="filterGrid">
        <button class="fil-btn" data-s="Принят">Принят</button>
        <button class="fil-btn" data-s="В работе">В работе</button>
        <button class="fil-btn" data-s="В пути">В пути</button>
    </div>
</div>

<div id="cardList"></div>

<div class="m-ov" id="mOv">
    <div class="modal">
        <h2 id="mTitle"></h2>
        <div id="mBody" style="margin-top:15px"></div>
        <button class="m-close" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<button class="rfsh" onclick="loadData()">🔄</button>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYfKN9J2yTqWNC2Pz31tqr7GEN6ClrXcFGLtNT-8bT_ECrmoVeXKoueX8AeMvl5d0W-w/exec';
let orders = [], activeStatus = null;

async function loadData() {
    document.getElementById('cardList').innerHTML = '<p style="text-align:center;padding:20px">Загрузка...</p>';
    try {
        const r = await fetch(SCRIPT_URL + '?t=' + Date.now());
        const d = await r.json();
        orders = d.orders || [];
        render();
    } catch(e) {
        document.getElementById('cardList').innerHTML = '<p style="color:red;padding:20px">Ошибка связи с таблицей</p>';
    }
}

function render() {
    const q = document.getElementById('srchIn').value.toLowerCase();
    const wh = document.getElementById('whSel').value;
    
    let filtered = orders.filter(o => {
        if (activeStatus && o.status !== activeStatus) return false;
        if (wh && o.warehouse !== wh) return false;
        if (q && !o.supplier.toLowerCase().includes(q)) return false;
        return true;
    });

    document.getElementById('cardList').innerHTML = filtered.map((o, i) => `
        <div class="card" onclick="openModal(${orders.indexOf(o)})">
            <div class="c-head">
                <span class="c-id">#${o.id}</span>
                <span class="s-pill">${o.status}</span>
            </div>
            <div class="c-supp">${o.supplier}</div>
            <div class="c-meta">${o.warehouse} • ${o.group}</div>
        </div>
    `).join('');
}

function openModal(idx) {
    const o = orders[idx];
    document.getElementById('mTitle').innerText = 'Заявка #' + o.id;
    document.getElementById('mBody').innerHTML = `
        <p><b>Поставщик:</b> ${o.supplier}</p>
        <p><b>Склад:</b> ${o.warehouse}</p>
        <p><b>Статус:</b> ${o.status}</p>
        <p><b>Комментарий:</b> ${o.comment || '—'}</p>
    `;
    document.getElementById('mOv').classList.add('open');
}

function closeModal() { document.getElementById('mOv').classList.remove('open'); }

document.querySelectorAll('.fil-btn').forEach(btn => {
    btn.onclick = () => {
        activeStatus = activeStatus === btn.dataset.s ? null : btn.dataset.s;
        document.querySelectorAll('.fil-btn').forEach(b => b.classList.toggle('active', b.dataset.s === activeStatus));
        render();
    };
});

document.getElementById('srchIn').oninput = render;
document.getElementById('whSel').onchange = render;

loadData();
</script>
</body>
</html>
